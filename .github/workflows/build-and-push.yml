name: Build and Push

on:
  pull_request:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Docker setup
        uses: ./.github/actions/docker-setup

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          load: true
          tags: simpletimeservice:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: docker run -d --name simpletimeservice -p 8080:8080 simpletimeservice:test

      - name: Wait for container to be ready
        run: sleep 3

      - name: Test API response
        run: |
          curl -f http://localhost:8080 | tee response.json
          cat response.json | grep -q "timestamp"
          cat response.json | grep -q "ip"
          echo "API response is valid"

      - name: Verify non-root user
        run: |
          USER=$(docker exec simpletimeservice whoami)
          echo "Running as: $USER"
          [ "$USER" = "nirdesh" ] && echo "Non-root check passed" || (echo "Running as root — FAIL" && exit 1)

      - name: Cleanup
        if: always()
        run: docker stop simpletimeservice && docker rm simpletimeservice

  push:
    name: Push to DockerHub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'release'

    steps:
      - name: Docker setup
        uses: ./.github/actions/docker-setup
        with:
          login: 'true'
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/simpletimeservice:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/simpletimeservice:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

