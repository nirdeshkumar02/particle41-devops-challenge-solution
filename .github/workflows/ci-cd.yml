name: CI-CD 

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

  release:
    types: [published]

env:
  IMAGE_NAME: simpletimeservice
  REGISTRY: docker.io
  IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/simpletimeservice
  TF_DIR: terraform

# ======================================
# 🧪 APP CI (BUILD + TEST + SCAN)
# ======================================
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker setup
        uses: ./.github/actions/docker-setup

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: docker run -d --name simpletimeservice -p 8080:8080 simpletimeservice:test

      - name: Wait for container to be ready
        run: sleep 3

      - name: Test API response
        run: |
          curl -f http://localhost:8080 | tee response.json
          cat response.json | grep -q "timestamp"
          cat response.json | grep -q "ip"
          echo "API response is valid"

      - name: Test health endpoint
        run: |
          curl -f http://localhost:8080/health | tee health.json
          cat health.json | grep -q "ok"
          echo "Health endpoint is valid"

      - name: Verify non-root user
        run: |
          USER=$(docker exec simpletimeservice whoami)
          echo "Running as: $USER"
          [ "$USER" = "nirdesh" ] && echo "Non-root check passed" || (echo "Running as root — FAIL" && exit 1)

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:test
          severity: HIGH,CRITICAL

      - name: Cleanup
        if: always()
        run: docker rm -f app || true


# ======================================
# 📐 TERRAFORM VALIDATION
# ======================================
  terraform-check:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform plan (PR only)
        if: github.event_name == 'pull_request'
        run: terraform plan
        working-directory: ${{ env.TF_DIR }}


# ======================================
# 📦 PUSH (MAIN)
# ======================================
  push-main:
    name: Push (main)
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker setup (with login)
        uses: ./.github/actions/docker-setup
        with:
          login: 'true'
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve short SHA tag
        id: sha
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.sha.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ======================================
# 🏷️ PUSH (RELEASE)
# ======================================
  push-release:
    name: Push (release)
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-check]
    if: github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker setup (with login)
        uses: ./.github/actions/docker-setup
        with:
          login: 'true'
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve version tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max