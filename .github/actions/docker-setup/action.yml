name: Docker Setup
description: Checks out code, sets up Docker Buildx, and optionally logs in to DockerHub

inputs:
  dockerhub-username:
    description: DockerHub username (required when login is true)
    required: false
  dockerhub-token:
    description: DockerHub token (required when login is true)
    required: false
  login:
    description: Whether to log in to DockerHub
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to DockerHub
      if: inputs.login == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}
